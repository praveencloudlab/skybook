services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - ./docker-data/postgres:/var/lib/postgresql/data
      - ./docker/postgres:/docker-entrypoint-initdb.d:ro
    # Internal-only (SECURITY_HARDENING_MODULE.md §3.1). NOT host-published:
    # postgres/postgres would otherwise expose the whole DB from the host.
    # Re-publish via a gitignored docker-compose.override.yml for local debug.
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.9.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      CLUSTER_ID: ci8gEXtHTVK6-4RJDVYJyA
      # Single-broker cluster - Kafka's defaults (replication factor 3 for
      # both) can never be satisfied with only 1 broker, so every internal
      # topic (__consumer_offsets, __transaction_state) fails to create and
      # every consumer group silently never commits an offset. Confirmed
      # live: kafka-consumer-groups.sh --list stayed empty despite services'
      # own logs showing "Subscribed to topic(s)", and the broker logs
      # showed continuous "Sent auto-creation request" retries that never
      # succeeded - the broker-api-versions healthcheck doesn't catch this
      # because it only checks the broker responds, not that topic creation
      # actually works.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - ./docker-data/kafka:/var/lib/kafka/data
    # Internal-only (§3.1) - reached as kafka:9092 on the compose network.
    expose:
      - "9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  auth-service:
    build:
      context: ./backend
      dockerfile: auth-service/Dockerfile
    # Internal-only (§3.1): all auth traffic enters via the gateway (8080).
    expose:
      - "8081"
      - "9081"   # management port (§7, internal-only)
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/skybook_auth
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: "-1"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # RS256 (SECURITY_HARDENING_MODULE.md §5): auth-service is the only holder
      # of the private signing key. The insecure ${VAR:?required} fail-fast form
      # lands with the secret-defaults cleanup (step 11).
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:?JWT_PRIVATE_KEY is required}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:?JWT_PUBLIC_KEY is required}
      JWT_ISSUER: ${JWT_ISSUER:-skybook-auth}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-skybook-api}
      SKYBOOK_BOOTSTRAP_ADMIN_EMAIL: ${SKYBOOK_BOOTSTRAP_ADMIN_EMAIL:-}
      # Service-client registry secrets (SECURITY_HARDENING_MODULE.md §3.3/§10):
      # auth hashes these into the client registry so booking/checkin/inventory
      # can obtain ROLE_SERVICE tokens. Required - no committed default. payment
      # is intentionally absent: it makes no outbound service calls.
      BOOKING_SERVICE_CLIENT_SECRET: ${BOOKING_SERVICE_CLIENT_SECRET:?BOOKING_SERVICE_CLIENT_SECRET is required}
      CHECKIN_SERVICE_CLIENT_SECRET: ${CHECKIN_SERVICE_CLIENT_SECRET:?CHECKIN_SERVICE_CLIENT_SECRET is required}
      INVENTORY_SERVICE_CLIENT_SECRET: ${INVENTORY_SERVICE_CLIENT_SECRET:?INVENTORY_SERVICE_CLIENT_SECRET is required}
      JAVA_OPTS: -javaagent:/otel/opentelemetry-javaagent-2.14.0.jar
      OTEL_SERVICE_NAME: auth-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
    volumes:
      - otel-agent:/otel:ro
    # Locked-down runtime (§8): read-only rootfs, writable tmpfs for /tmp only.
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      otel-agent:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  flight-service:
    build:
      context: ./backend
      dockerfile: flight-service/Dockerfile
    # Internal-only (§3.1): reached as flight-service:8082 on the compose network.
    expose:
      - "8082"
      - "9082"   # management port (§7, internal-only)
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/skybook_flight
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: "-1"
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:?JWT_PUBLIC_KEY is required}
      JWT_ISSUER: ${JWT_ISSUER:-skybook-auth}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-skybook-api}
      JAVA_OPTS: -javaagent:/otel/opentelemetry-javaagent-2.14.0.jar
      OTEL_SERVICE_NAME: flight-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
    volumes:
      - otel-agent:/otel:ro
    # Locked-down runtime (§8): read-only rootfs, writable tmpfs for /tmp only.
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      postgres:
        condition: service_healthy
      otel-agent:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  booking-service:
    build:
      context: ./backend
      dockerfile: booking-service/Dockerfile
    # Internal-only (§3.1): reached as booking-service:8083 on the compose network.
    expose:
      - "8083"
      - "9083"   # management port (§7, internal-only)
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/skybook_booking
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: "-1"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      FLIGHT_SERVICE_BASE_URL: http://flight-service:8082
      INVENTORY_SERVICE_BASE_URL: http://inventory-service:8084
      # Verify-only public key for JWT authentication (§3.2/§5).
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:?JWT_PUBLIC_KEY is required}
      JWT_ISSUER: ${JWT_ISSUER:-skybook-auth}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-skybook-api}
      # Client credential for ROLE_SERVICE tokens on inventory writes (§3.3).
      AUTH_SERVICE_BASE_URL: http://auth-service:8081
      BOOKING_SERVICE_CLIENT_SECRET: ${BOOKING_SERVICE_CLIENT_SECRET:?BOOKING_SERVICE_CLIENT_SECRET is required}
      JAVA_OPTS: -javaagent:/otel/opentelemetry-javaagent-2.14.0.jar
      OTEL_SERVICE_NAME: booking-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
    volumes:
      - otel-agent:/otel:ro
    # Locked-down runtime (§8): read-only rootfs, writable tmpfs for /tmp only.
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      otel-agent:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9083/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  inventory-service:
    build:
      context: ./backend
      dockerfile: inventory-service/Dockerfile
    # Internal-only (§3.1): reached as inventory-service:8084 on the compose network.
    expose:
      - "8084"
      - "9084"   # management port (§7, internal-only)
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/skybook_inventory
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: "-1"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      FLIGHT_SERVICE_BASE_URL: http://flight-service:8082
      # JWT validation (§4.4/§5): verify-only public key + issuer/audience.
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:?JWT_PUBLIC_KEY is required}
      JWT_ISSUER: ${JWT_ISSUER:-skybook-auth}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-skybook-api}
      JAVA_OPTS: -javaagent:/otel/opentelemetry-javaagent-2.14.0.jar
      OTEL_SERVICE_NAME: inventory-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
    volumes:
      - otel-agent:/otel:ro
    # Locked-down runtime (§8): read-only rootfs, writable tmpfs for /tmp only.
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      otel-agent:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9084/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  notification-service:
    build:
      context: ./backend
      dockerfile: notification-service/Dockerfile
    # Internal-only (§3.1): pure Kafka consumer, no inbound business traffic.
    expose:
      - "8085"
      - "9085"   # management port (§7, internal-only)
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      JAVA_OPTS: -javaagent:/otel/opentelemetry-javaagent-2.14.0.jar
      OTEL_SERVICE_NAME: notification-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
    volumes:
      - otel-agent:/otel:ro
    # Locked-down runtime (§8): read-only rootfs, writable tmpfs for /tmp only.
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      kafka:
        condition: service_healthy
      otel-agent:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9085/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  payment-service:
    build:
      context: ./backend
      dockerfile: payment-service/Dockerfile
    # Internal-only (§3.1): reached as payment-service:8086 on the compose network.
    expose:
      - "8086"
      - "9086"   # management port (§7, internal-only)
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/skybook_payment
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: "-1"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:?JWT_PUBLIC_KEY is required}
      JWT_ISSUER: ${JWT_ISSUER:-skybook-auth}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-skybook-api}
      JAVA_OPTS: -javaagent:/otel/opentelemetry-javaagent-2.14.0.jar
      OTEL_SERVICE_NAME: payment-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
    volumes:
      - otel-agent:/otel:ro
    # Locked-down runtime (§8): read-only rootfs, writable tmpfs for /tmp only.
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      otel-agent:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9086/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  checkin-service:
    build:
      context: ./backend
      dockerfile: checkin-service/Dockerfile
    # Internal-only (§3.1): reached as checkin-service:8087 on the compose network.
    expose:
      - "8087"
      - "9087"   # management port (§7, internal-only)
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/skybook_checkin
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: "-1"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      FLIGHT_SERVICE_BASE_URL: http://flight-service:8082
      INVENTORY_SERVICE_BASE_URL: http://inventory-service:8084
      CHECKIN_BOARDING_PASS_KEY: ${CHECKIN_BOARDING_PASS_KEY:?CHECKIN_BOARDING_PASS_KEY is required}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:?JWT_PUBLIC_KEY is required}
      JWT_ISSUER: ${JWT_ISSUER:-skybook-auth}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-skybook-api}
      AUTH_SERVICE_BASE_URL: http://auth-service:8081
      CHECKIN_SERVICE_CLIENT_SECRET: ${CHECKIN_SERVICE_CLIENT_SECRET:?CHECKIN_SERVICE_CLIENT_SECRET is required}
      JAVA_OPTS: -javaagent:/otel/opentelemetry-javaagent-2.14.0.jar
      OTEL_SERVICE_NAME: checkin-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
    volumes:
      - otel-agent:/otel:ro
    # Locked-down runtime (§8): read-only rootfs, writable tmpfs for /tmp only.
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      otel-agent:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9087/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api-gateway:
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      # Verify-only: the gateway holds the PUBLIC key, never a signing key (§5).
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:?JWT_PUBLIC_KEY is required}
      JWT_ISSUER: ${JWT_ISSUER:-skybook-auth}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-skybook-api}
      SERVICES_AUTH_SERVICE_BASE_URL: http://auth-service:8081
      SERVICES_FLIGHT_SERVICE_BASE_URL: http://flight-service:8082
      SERVICES_BOOKING_SERVICE_BASE_URL: http://booking-service:8083
      SERVICES_INVENTORY_SERVICE_BASE_URL: http://inventory-service:8084
      SERVICES_PAYMENT_SERVICE_BASE_URL: http://payment-service:8086
      SERVICES_CHECKIN_SERVICE_BASE_URL: http://checkin-service:8087
      JAVA_OPTS: -javaagent:/otel/opentelemetry-javaagent-2.14.0.jar
      OTEL_SERVICE_NAME: api-gateway
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
    volumes:
      - otel-agent:/otel:ro
    # Locked-down runtime (§8): read-only rootfs, writable tmpfs for /tmp only.
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      otel-agent:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    # No depends_on the app services themselves - DownstreamErrorHandlingFilter
    # already turns "downstream not up yet" into a clean 502 instead of the
    # gateway needing them up first (API_GATEWAY_MODULE.md's own design).


  # The passenger-facing SPA (FRONTEND_MODULE.md §8). nginx serves the built
  # static bundle and proxies /api to the gateway, so the browser sees ONE
  # origin - which is what lets the session cookie be SameSite=Lax rather than
  # SameSite=None (§10.1). Port 3000 was reserved for this when observability
  # deliberately put Grafana on 3001.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      api-gateway:
        condition: service_healthy
    read_only: true
    # mode=1777 matters: a tmpfs mounts root-owned by default, and nginx runs as
    # the non-root 'nginx' user - without it the worker cannot create
    # /var/cache/nginx/client_temp and the container dies on startup.
    tmpfs:
      - /tmp:mode=1777
      - /var/cache/nginx:mode=1777
      - /var/run:mode=1777
    healthcheck:
      # 127.0.0.1, not localhost: the read-only rootfs stops nginx's entrypoint
      # adding its IPv6 listener, so localhost (::1) is refused inside.
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ---------------- Observability (OBSERVABILITY_MODULE.md) ----------------

  prometheus:
    image: prom/prometheus:v3.2.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./docker/prometheus:/etc/prometheus:ro
      - ./docker-data/prometheus:/prometheus
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/ready"]
      interval: 10s
      timeout: 5s
      retries: 10

  loki:
    image: grafana/loki:3.4.2
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./docker/loki:/etc/loki:ro
      - ./docker-data/loki:/loki
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  promtail:
    image: grafana/promtail:3.4.2
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./docker/promtail:/etc/promtail:ro
      - ./docker-data/promtail:/positions
      # Read-only Docker socket + container log files - how docker_sd
      # discovers containers and tails their json-file logs.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      loki:
        condition: service_healthy

  tempo:
    image: grafana/tempo:2.7.1
    command: -config.file=/etc/tempo/tempo.yml
    user: root # local-filesystem writes into the bind mount
    volumes:
      - ./docker/tempo:/etc/tempo:ro
      # NOT /tempo - that's the Tempo binary itself in this image (its
      # entrypoint); mounting a directory over it fails with a confusing
      # "not a directory" error pointing at the host path.
      - ./docker-data/tempo:/var/tempo
    ports:
      - "3200:3200"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3200/ready"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  # One-shot: downloads the pinned OTel Java agent into the shared volume the
  # app services mount read-only at /otel (OBSERVABILITY_MODULE.md §5) -
  # images stay untouched, the version is pinned in exactly one place.
  otel-agent:
    image: curlimages/curl:8.12.1
    user: root # the named volume is root-owned; the image's default curl_user can't write to it
    command: ["sh", "-c", "test -f /otel/opentelemetry-javaagent-2.14.0.jar || curl -fsSL -o /otel/opentelemetry-javaagent-2.14.0.jar https://github.com/open-telemetry/opentelemetry-java-instrumentation/releases/download/v2.14.0/opentelemetry-javaagent.jar"]
    volumes:
      - otel-agent:/otel

  grafana:
    image: grafana/grafana:11.6.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./docker-data/grafana:/var/lib/grafana
    ports:
      # 3001, not Grafana's default 3000 - the gateway's CORS config reserves
      # localhost:3000 as a future frontend dev origin (OBSERVABILITY_MODULE.md §8).
      - "3001:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  otel-agent:
