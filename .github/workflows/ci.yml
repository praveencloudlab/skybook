name: CI

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  build-and-verify:
    name: Build & Verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # secrets.* isn't a valid context in a step-level `if:` (only env,
      # github, job, etc. are) - routing it through a job-level env var
      # first lets the SonarCloud step below check whether the secret has
      # actually been configured yet without unconditionally failing every
      # run before the one-time external setup (CI_CD_MODULE.md §7) is done.
      SONAR_TOKEN_CONFIGURED: ${{ secrets.SONAR_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Compile
        working-directory: backend
        run: mvn -B compile

      - name: Test (unit + integration)
        working-directory: backend
        run: mvn -B clean verify

      - name: Upload test & coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-and-coverage-reports
          path: |
            backend/*/target/surefire-reports/
            backend/*/target/failsafe-reports/
            backend/*/target/site/jacoco/
            backend/*/target/site/jacoco-it/
          retention-days: 14

      - name: SonarCloud scan
        if: ${{ env.SONAR_TOKEN_CONFIGURED == 'true' }}
        working-directory: backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B sonar:sonar

  docker-build-push:
    name: Docker build & push (${{ matrix.service }})
    needs: build-and-verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - booking-service
          - checkin-service
          - flight-service
          - inventory-service
          - notification-service
          - payment-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/skybook-${{ matrix.service }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/skybook-${{ matrix.service }}:latest

  # OTel agent carrier image (KUBERNETES_MODULE.md §5): the pinned agent jar
  # as an immutable OCI artifact for the k8s initContainer - its own job, not
  # a matrix contortion, because it has a different build context and a
  # version-pinned tag. Version here must match docker/otel-agent/Dockerfile's
  # OTEL_AGENT_VERSION ARG when bumping.
  docker-build-push-otel-agent:
    name: Docker build & push (otel-agent)
    needs: build-and-verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./docker/otel-agent
          file: ./docker/otel-agent/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/skybook-otel-agent:2.14.0
            ghcr.io/${{ github.repository_owner }}/skybook-otel-agent:latest
