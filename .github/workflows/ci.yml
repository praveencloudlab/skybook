name: CI

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  build-and-verify:
    name: Build & Verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # Trivy dependency-scan SARIF upload (§9)
    env:
      # secrets.* isn't a valid context in a step-level `if:` (only env,
      # github, job, etc. are) - routing it through a job-level env var
      # first lets the SonarCloud step below check whether the secret has
      # actually been configured yet without unconditionally failing every
      # run before the one-time external setup (CI_CD_MODULE.md §7) is done.
      SONAR_TOKEN_CONFIGURED: ${{ secrets.SONAR_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Compile
        working-directory: backend
        run: mvn -B compile

      - name: Test (unit + integration)
        working-directory: backend
        run: mvn -B clean verify

      - name: Upload test & coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-and-coverage-reports
          path: |
            backend/*/target/surefire-reports/
            backend/*/target/failsafe-reports/
            backend/*/target/site/jacoco/
            backend/*/target/site/jacoco-it/
          retention-days: 14

      - name: SonarCloud scan
        if: ${{ env.SONAR_TOKEN_CONFIGURED == 'true' }}
        working-directory: backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B sonar:sonar

      # Dependency scan (SECURITY_HARDENING_MODULE.md §9): Trivy fs over the
      # built artifacts (the -exec fat jars produced by `verify` above), so the
      # transitive, actually-packaged dependencies are what's scanned - not just
      # the source pom. Fails the build on fixable HIGH/CRITICAL (CVSS >= 7);
      # .trivyignore holds accepted findings so the gate stays actionable.
      - name: Trivy dependency scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: backend
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          # Without this, trivy-action reports (and gates via exit-code on) ALL
          # severities when format=sarif - so the build would fail on MEDIUM/LOW
          # base-image noise, not just the HIGH/CRITICAL the gate is meant for.
          limit-severities-for-sarif: true
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: '1'

      - name: Upload dependency-scan SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  # Build -> scan -> (only then) push (SECURITY_HARDENING_MODULE.md §9).
  # Runs on PRs to main (build + scan, NO push) and on push to main (build +
  # scan + push only after the scan passes). An image is never pushed unscanned.
  docker-build-scan-push:
    name: Docker build, scan & push (${{ matrix.service }})
    needs: build-and-verify
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
      || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write   # image-scan SARIF upload (§9)
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - booking-service
          - checkin-service
          - flight-service
          - inventory-service
          - notification-service
          - payment-service
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/skybook-${{ matrix.service }}
      IS_MAIN_PUSH: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Build into the local daemon only (load, not push) so the image can be
      # scanned before it ever leaves the runner.
      - name: Build image (local, not pushed)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/${{ matrix.service }}/Dockerfile
          load: true
          push: false
          tags: ${{ env.IMAGE }}:${{ github.sha }}

      # Gate: fail on fixable HIGH/CRITICAL (CVSS >= 7). Because this step fails
      # before the push steps (which are not `if: always()`), a vulnerable image
      # is never pushed. SARIF still uploads via the always() step below.
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          format: sarif
          output: trivy-image-${{ matrix.service }}.sarif
          severity: HIGH,CRITICAL
          # Gate on HIGH/CRITICAL only - without this, format=sarif makes the
          # exit-code fire on all severities (the base image's MEDIUM/LOW Ubuntu
          # package CVEs would fail every build though the gate targets HIGH/CRIT).
          limit-severities-for-sarif: true
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: '1'

      - name: Upload image-scan SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-${{ matrix.service }}.sarif
          category: trivy-image-${{ matrix.service }}

      # Push only on main, and only reached if the scan above passed.
      - name: Log in to GHCR
        if: ${{ env.IS_MAIN_PUSH == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push scanned image
        if: ${{ env.IS_MAIN_PUSH == 'true' }}
        run: |
          docker tag "${IMAGE}:${GITHUB_SHA}" "${IMAGE}:latest"
          docker push "${IMAGE}:${GITHUB_SHA}"
          docker push "${IMAGE}:latest"
