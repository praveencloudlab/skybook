name: Frontend

# Deliberately SEPARATE from the Java CI (FRONTEND_MODULE.md §8): a change to a
# React component has no business triggering a full Maven reactor and an 8-image
# backend matrix, and vice versa. Path filters keep each pipeline to its own
# tree.
on:
  push:
    branches: [main, 'feature/**']
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  verify:
    name: Lint, typecheck, test & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # `npm ci` rather than `install`: it installs exactly the lockfile and
      # fails if package.json and the lock have drifted, which is the point of
      # having a lockfile in CI.
      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      # Typecheck is its own step so a type error is reported as a type error,
      # rather than surfacing as a confusing build failure.
      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload build output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  image:
    name: Docker build & scan
    needs: verify
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
      || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/skybook-frontend
      IS_MAIN_PUSH: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Same scan-before-push discipline as the backend images
      # (SECURITY_HARDENING_MODULE.md §9): build locally, scan, and only then
      # push. An image is never published unscanned.
      - name: Build image (local, not pushed)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          load: true
          push: false
          tags: ${{ env.IMAGE }}:${{ github.sha }}

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          format: sarif
          output: trivy-frontend.sarif
          severity: HIGH,CRITICAL
          # Without this, format=sarif makes the exit-code fire on ALL
          # severities - the backend pipeline failed for exactly this reason.
          limit-severities-for-sarif: true
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: '1'

      - name: Upload scan SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

      - name: Log in to GHCR
        if: ${{ env.IS_MAIN_PUSH == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push scanned image
        if: ${{ env.IS_MAIN_PUSH == 'true' }}
        run: |
          docker tag "${IMAGE}:${GITHUB_SHA}" "${IMAGE}:latest"
          docker push "${IMAGE}:${GITHUB_SHA}"
          docker push "${IMAGE}:latest"
