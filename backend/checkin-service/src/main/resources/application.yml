server:
  port: 8087

spring:
  application:
    name: checkin-service

  cloud:
    openfeign:
      client:
        config:
          # Fleet default (RESILIENCE_MODULE.md section 4): all inter-service
          # calls are small-payload CRUD between co-located containers -
          # anything slower IS a failure. Overrides Feign's 10s connect /
          # 60s read defaults.
          default:
            connect-timeout: 2000
            read-timeout: 5000

  datasource:
    url: jdbc:postgresql://localhost:5432/skybook_checkin
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  kafka:
    bootstrap-servers: localhost:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

    consumer:
      group-id: checkin-service
      auto-offset-reset: earliest

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

springdoc:
  api-docs:
    path: /api-docs

  swagger-ui:
    path: /swagger-ui.html

  packages-to-scan: com.skybook.praveen.checkinservice.controller

# Synchronous dependencies (design doc section 9): flight status/departure
# time, seat-reservation lookups and seat-change calls.
flight-service:
  base-url: http://localhost:8082

inventory-service:
  base-url: http://localhost:8084

# RESILIENCE_MODULE.md §5-§7. All thresholds are reasoned defaults, expected
# to be re-tuned against the Grafana dashboards once real load data exists.
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 2
        # 4xx (FeignClientException) deliberately NOT recorded - a 404/409
        # proves the downstream is up; only 5xx/timeouts/connect failures
        # indicate ill-health.
        record-exceptions:
          - feign.RetryableException
          - feign.FeignException.FeignServerException
        register-health-indicator: true
    instances:
      flight:
        base-config: default
      inventory:
        base-config: default
  retry:
    configs:
      reads:
        max-attempts: 3
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - feign.RetryableException
          - feign.FeignException.FeignServerException
    instances:
      flight-read:
        base-config: reads
      inventory-read:
        base-config: reads
  bulkhead:
    configs:
      default:
        max-concurrent-calls: 10
        max-wait-duration: 100ms
    instances:
      flight:
        base-config: default
      inventory:
        base-config: default

skybook:
  kafka:
    topics:
      # Consumed - BookingEvent CONFIRMED creates CheckIn rows, CANCELLED cascades.
      booking-events: skybook.booking.events
      # Produced - PassengerCheckedIn/Boarded/NoShow, BoardingPassGenerated.
      checkin-events: skybook.checkin.events

checkin:
  window:
    opens-hours-before-departure: 24
    closes-minutes-before-departure: 45
  boarding:
    opens-minutes-before-departure: 45
    gate-closes-minutes-before-departure: 20
  baggage:
    allowance-kg:
      economy-saver: 15
      economy-flexi: 20
      premium-economy: 25
      business: 32
    excess-charge-per-kg: 10
  boarding-pass:
    # Symmetric HMAC key (design doc section 6) - dev-only default here;
    # override via CHECKIN_BOARDING_PASS_KEY in any real deployment.
    signing-key: ${CHECKIN_BOARDING_PASS_KEY:dev-only-insecure-signing-key-change-me}
