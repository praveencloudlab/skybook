server:
  port: 8083

spring:
  application:
    name: booking-service

  datasource:
    url: jdbc:postgresql://localhost:5432/skybook_booking
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  kafka:
    bootstrap-servers: localhost:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  api-docs:
    path: /api-docs

  swagger-ui:
    path: /swagger-ui.html

  packages-to-scan: com.skybook.praveen.bookingservice.controller

# Synchronous dependencies (Sprint 6): flight validation at create time,
# seat hold/reserve/release against inventory-service.
flight-service:
  base-url: http://localhost:8082

inventory-service:
  base-url: http://localhost:8084

skybook:
  kafka:
    topics:
      # Consumed by PaymentEventConsumer - PAYMENT_SUCCEEDED confirms bookings.
      payment-events: skybook.payment.events
