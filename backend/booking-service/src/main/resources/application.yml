server:
  port: 8083

spring:
  application:
    name: booking-service

  datasource:
    url: jdbc:postgresql://localhost:5432/skybook_booking
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  kafka:
    bootstrap-servers: localhost:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  api-docs:
    path: /api-docs

  swagger-ui:
    path: /swagger-ui.html

  packages-to-scan: com.skybook.praveen.bookingservice.controller

# Base URL for the one other service booking-service talks to directly
# (see FlightServiceClient / BookingFacade). Flight validation only - no
# other cross-service calls exist yet (Payment/Inventory are future work).
flight-service:
  base-url: http://localhost:8082
