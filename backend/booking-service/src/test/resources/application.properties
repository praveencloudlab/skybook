# Tests provision their schema via Hibernate create-drop against throwaway
# Testcontainers databases (each test base sets ddl-auto explicitly) - Flyway
# stays out of their way here. The real migration path (V1 baseline + V2
# delta + ddl-auto validate) is exercised by FlywayMigrationIntegrationTest,
# which re-enables it.
spring.flyway.enabled=false

# Test JWT verification key (SECURITY_HARDENING_MODULE.md §5) - a throwaway
# 2048-bit RSA public key so the shared validator's boot check passes in the
# context test. Public and test-only; the matching private key is not needed.
skybook.security.public-
skybook.security.issuer=skybook-auth
skybook.security.user-audience=skybook-api
skybook.security.service-audience=booking-service

# Test-only values for the secrets whose committed defaults were removed
# (SECURITY_HARDENING_MODULE.md §10). The Testcontainers ITs override the
# datasource via @DynamicPropertySource; these keep any context that binds the
# property from failing on an unresolved placeholder.
spring.datasource.username=postgres
spring.datasource.password=postgres
skybook.security.service-client.client-secret=test-booking-secret
