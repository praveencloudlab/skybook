# Tests provision their schema via Hibernate create-drop against throwaway
# Testcontainers databases (each test base sets ddl-auto explicitly) - Flyway
# stays out of their way here. The real migration path (V1 baseline + V2
# delta + ddl-auto validate) is exercised by FlywayMigrationIntegrationTest,
# which re-enables it.
spring.flyway.enabled=false
