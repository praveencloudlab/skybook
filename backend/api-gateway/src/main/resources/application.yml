server:
  port: 8080

spring:
  application:
    name: api-gateway

services:
  auth-service:
    base-url: http://localhost:8081
  flight-service:
    base-url: http://localhost:8082
  booking-service:
    base-url: http://localhost:8083
  inventory-service:
    base-url: http://localhost:8084
  payment-service:
    base-url: http://localhost:8086
  checkin-service:
    base-url: http://localhost:8087

# Shared JWT validation (SECURITY_HARDENING_MODULE.md §5). Verify-only: the
# gateway holds the PUBLIC key, never a signing key. accept-service-tokens=false
# so a machine token can never enter through the public edge.
skybook:
  security:
    public-key: ${JWT_PUBLIC_KEY}
    issuer: ${JWT_ISSUER:skybook-auth}
    user-audience: ${JWT_AUDIENCE:skybook-api}
    accept-service-tokens: false

gateway:
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000
  rate-limit:
    requests-per-minute: 100

management:
  # Actuator on a separate internal-only port (SECURITY_HARDENING_MODULE.md §7):
  # closes the gateway's actuator surface on the public 8080 edge.
  server:
    port: 9080
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
        add-additional-paths: true   # /livez + /readyz on the MAIN port (k8s probes)
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
