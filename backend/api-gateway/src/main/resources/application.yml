server:
  port: 8080

spring:
  application:
    name: api-gateway

services:
  auth-service:
    base-url: http://localhost:8081
  flight-service:
    base-url: http://localhost:8082
  booking-service:
    base-url: http://localhost:8083
  inventory-service:
    base-url: http://localhost:8084
  payment-service:
    base-url: http://localhost:8086
  checkin-service:
    base-url: http://localhost:8087

jwt:
  secret: ${JWT_SECRET}

gateway:
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000
  rate-limit:
    requests-per-minute: 100

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        # Registers the livenessState/readinessState contributors everywhere,
        # not only in-cluster - without this, the explicit groups below fail
        # Boot startup validation in tests and compose.
        enabled: true
      group:
        # No DB here - readiness carries only the application's own state
        # (KUBERNETES_MODULE.md section 7). Downstream service availability
        # is deliberately NOT readiness: DownstreamErrorHandlingFilter
        # already degrades per-route with 502s.
        liveness:
          include: livenessState
        readiness:
          include: readinessState
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
