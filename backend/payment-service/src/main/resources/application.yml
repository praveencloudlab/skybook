server:
  port: 8086

spring:
  application:
    name: payment-service

  datasource:
    url: jdbc:postgresql://localhost:5432/skybook_payment
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: validate   # Flyway owns the schema (SECURITY_HARDENING_MODULE.md §4.5)
    show-sql: true

  flyway:
    # Existing Hibernate-created DB is adopted at V1 (the guarded baseline is a
    # no-op there, only V2+ runs); a fresh DB runs V1+V2.
    baseline-on-migrate: true
    baseline-version: 1

  kafka:
    bootstrap-servers: localhost:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

    consumer:
      group-id: payment-service
      auto-offset-reset: earliest

management:
  # Actuator on a separate internal-only port (SECURITY_HARDENING_MODULE.md §7).
  server:
    port: 9086
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
        add-additional-paths: true   # /livez + /readyz on the MAIN port (k8s probes)
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

springdoc:
  api-docs:
    path: /api-docs

  swagger-ui:
    path: /swagger-ui.html

  packages-to-scan: com.skybook.praveen.paymentservice.controller

skybook:
  kafka:
    topics:
      booking-events: skybook.booking.events
  # JWT validation (SECURITY_HARDENING_MODULE.md §4.4/§5): verify-only public key.
  security:
    public-key: ${JWT_PUBLIC_KEY}
    issuer: ${JWT_ISSUER:skybook-auth}
    user-audience: ${JWT_AUDIENCE:skybook-api}
    service-audience: payment-service

payment:
  # ISO-4217 codes accepted by CurrencyValidator.
  supported-currencies: USD,GBP,EUR,INR
  refund:
    # Cancellation fee withheld from SAVER fares (design doc section 6).
    saver-fee-percent: 30
  gateway:
    # v1: SimulatedPaymentGateway (amounts ending .13 decline authorization,
    # .31 fail capture). Future: stripe/adyen selection.
    simulated: true
