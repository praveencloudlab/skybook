server:
  port: 8085

spring:
  application:
    name: notification-service

  kafka:
    bootstrap-servers: localhost:9092

    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

      properties:
        spring.json.trusted.packages: "com.skybook.praveen.common.*"
        spring.json.value.default.type: "com.skybook.praveen.common.event.EmailEvent"
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true


skybook:
  kafka:
    topics:
      email-events: skybook.email.events
      booking-events: skybook.booking.events
      checkin-events: skybook.checkin.events

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        # Registers the livenessState/readinessState contributors everywhere,
        # not only in-cluster - without this, the explicit groups below fail
        # Boot startup validation in tests and compose.
        enabled: true
      group:
        # No DB here - readiness carries only the application's own state
        # (KUBERNETES_MODULE.md section 7). Kafka is deliberately excluded:
        # the resilience branch's consumer retries + DLTs make a broker
        # outage degraded async processing, not unavailability. Mail health
        # is already disabled entirely (dockerization finding).
        liveness:
          include: livenessState
        readiness:
          include: readinessState
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
  health:
    # Actuator auto-configures a mail health indicator that actually opens
    # an SMTP connection - a bad/placeholder Gmail app password (or no
    # network route to smtp.gmail.com at all) would then permanently mark
    # this service DOWN even though the app itself is fine, since Kafka
    # consumption doesn't depend on SMTP being reachable. Found live: the
    # container never went healthy in Compose with a placeholder password.
    mail:
      enabled: false