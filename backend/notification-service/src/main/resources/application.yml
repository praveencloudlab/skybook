server:
  port: 8085

spring:
  application:
    name: notification-service

  kafka:
    bootstrap-servers: localhost:9092

    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

      properties:
        spring.json.trusted.packages: "com.skybook.praveen.common.*"
        spring.json.value.default.type: "com.skybook.praveen.common.event.EmailEvent"
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true


skybook:
  kafka:
    topics:
      email-events: skybook.email.events
      booking-events: skybook.booking.events
      checkin-events: skybook.checkin.events

management:
  # Actuator on a separate internal-only port (SECURITY_HARDENING_MODULE.md §7).
  server:
    port: 9085
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
        add-additional-paths: true   # /livez + /readyz on the MAIN port (k8s probes)
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
  health:
    # Actuator auto-configures a mail health indicator that actually opens
    # an SMTP connection - a bad/placeholder Gmail app password (or no
    # network route to smtp.gmail.com at all) would then permanently mark
    # this service DOWN even though the app itself is fine, since Kafka
    # consumption doesn't depend on SMTP being reachable. Found live: the
    # container never went healthy in Compose with a placeholder password.
    mail:
      enabled: false