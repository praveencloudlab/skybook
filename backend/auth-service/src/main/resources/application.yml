server:
  port: 8081

spring:
  kafka:
    bootstrap-servers: localhost:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  datasource:
    url: jdbc:postgresql://localhost:5432/skybook_auth
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        # Registers the livenessState/readinessState contributors everywhere,
        # not only in-cluster - without this, the explicit groups below fail
        # Boot startup validation in tests and compose.
        enabled: true
      group:
        # Explicit probe-group membership (KUBERNETES_MODULE.md section 7) -
        # Boot's default readiness does NOT include the db indicator.
        # Liveness never includes external deps (restart storms); Kafka is
        # deliberately in neither group (resilience DLTs make broker outage
        # degraded async processing, not unavailability).
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true