server:
  port: 8084

spring:
  application:
    name: inventory-service

  cloud:
    openfeign:
      client:
        config:
          # Fleet default (RESILIENCE_MODULE.md section 4): all inter-service
          # calls are small-payload CRUD between co-located containers -
          # anything slower IS a failure. Overrides Feign's 10s connect /
          # 60s read defaults.
          default:
            connect-timeout: 2000
            read-timeout: 5000

  datasource:
    url: jdbc:postgresql://localhost:5432/skybook_inventory
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  kafka:
    bootstrap-servers: localhost:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

springdoc:
  api-docs:
    path: /api-docs

  swagger-ui:
    path: /swagger-ui.html

  packages-to-scan: com.skybook.praveen.inventoryservice.controller

# Base URL for flight-service lookups (Feign client - added later this sprint).
flight-service:
  base-url: http://localhost:8082

inventory:
  hold:
    # How long a seat hold blocks the seat before SeatHoldExpiryJob releases it.
    ttl-minutes: 15
    # How often SeatHoldExpiryJob sweeps for expired holds.
    sweep-interval-ms: 60000
