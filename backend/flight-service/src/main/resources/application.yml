server:
  port: 8082

spring:
  application:
    name: flight-service

  datasource:
    url: jdbc:postgresql://localhost:5432/skybook_flight
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        # Registers the livenessState/readinessState contributors everywhere,
        # not only in-cluster - without this, the explicit groups below fail
        # Boot startup validation in tests and compose.
        enabled: true
      group:
        # Explicit probe-group membership (KUBERNETES_MODULE.md section 7) -
        # Boot's default readiness does NOT include the db indicator.
        # Liveness never includes external deps (restart storms).
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

springdoc:
  api-docs:
    path: /api-docs

  swagger-ui:
    path: /swagger-ui.html

  packages-to-scan: com.skybook.praveen.flightservice.controller