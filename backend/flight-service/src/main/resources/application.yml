server:
  port: 8082

spring:
  application:
    name: flight-service

  datasource:
    url: jdbc:postgresql://localhost:5432/skybook_flight
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

springdoc:
  api-docs:
    path: /api-docs

  swagger-ui:
    path: /swagger-ui.html

  packages-to-scan: com.skybook.praveen.flightservice.controller