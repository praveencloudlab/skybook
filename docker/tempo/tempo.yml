# Single-node Tempo, local storage (OBSERVABILITY_MODULE.md §5) - receives
# OTLP gRPC from the OTel Java agents, queried by Grafana on :3200.
server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal

compactor:
  compaction:
    block_retention: 168h # 7 days, matching Loki's retention
