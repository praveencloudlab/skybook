# nginx config for the built SPA (FRONTEND_MODULE.md §8, §10.1).
#
# This does the same job the Vite dev proxy does in development, and for the same
# reason: it puts the SPA and the API on ONE ORIGIN. That is what makes the
# httpOnly session cookie usable - it lets the cookie be SameSite=Lax, which is a
# real CSRF control, instead of SameSite=None, which is sent cross-site and would
# need CSRF tokens of its own. Development and production therefore share one
# origin model rather than two.

server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hashed asset filenames are immutable, so they can be cached hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html must NOT be cached: it is what points at the hashed bundles, so
    # a stale copy pins a returning visitor to a deployment that no longer exists.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Everything under /api goes to the gateway - the single public entry point.
    location /api/ {
        proxy_pass         http://api-gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Cookies pass straight through: the session cookie is set by
        # auth-service and must reach the browser with its attributes intact.
        proxy_pass_request_headers on;
    }

    # Client-side routing: any unknown path is a React route, not a 404. Without
    # this, refreshing on /bookings would 404 from nginx rather than reaching the
    # router.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Modest hardening for a static origin. No CSP here: the app is same-origin
    # with the API and ships no inline scripts, but a real policy needs to be
    # written against the deployed asset set rather than guessed at.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
