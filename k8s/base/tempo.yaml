apiVersion: v1
kind: Service
metadata:
  name: tempo
  namespace: skybook
spec:
  type: ClusterIP
  selector:
    app: tempo
  ports:
    - port: 3200
      name: http
    - port: 4317
      name: otlp-grpc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
  namespace: skybook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tempo
  template:
    metadata:
      labels:
        app: tempo
    spec:
      containers:
        - name: tempo
          image: grafana/tempo:2.7.1
          args: ["-config.file=/etc/tempo/tempo.yml"]
          ports:
            - containerPort: 3200
            - containerPort: 4317
          volumeMounts:
            - name: config
              mountPath: /etc/tempo
              readOnly: true
            # /var/tempo, NOT /tempo - that's the binary in this image
            # (dockerization-era lesson, docs OBSERVABILITY_MODULE.md §13)
            - name: data
              mountPath: /var/tempo
          readinessProbe:
            httpGet: { path: /ready, port: 3200 }
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests: { memory: "256Mi", cpu: "100m" }
            limits: { memory: "512Mi" }
      volumes:
        - name: config
          configMap:
            name: tempo-config
        - name: data
          persistentVolumeClaim:
            claimName: tempo-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tempo-data
  namespace: skybook
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
