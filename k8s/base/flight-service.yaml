# Template service (KUBERNETES_MODULE.md §5): every app service follows this
# exact shape - GHCR image, OTel agent via pinned-OCI-image initContainer
# (design review: no GitHub download at pod startup), explicit probe
# endpoints (§7's health groups), requests + memory-only limits (§8).
apiVersion: v1
kind: Service
metadata:
  name: flight-service
  namespace: skybook
spec:
  type: ClusterIP # trust boundary (§9): nothing but the gateway is exposed
  selector:
    app: flight-service
  ports:
    - port: 8082
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flight-service
  namespace: skybook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flight-service
  template:
    metadata:
      labels:
        app: flight-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /actuator/prometheus
        prometheus.io/port: "8082"
    spec:
      initContainers:
        - name: otel-agent
          image: ghcr.io/praveencloudlab/skybook-otel-agent:2.14.0
          volumeMounts:
            - name: otel
              mountPath: /target
      containers:
        - name: flight-service
          image: ghcr.io/praveencloudlab/skybook-flight-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: flight-service-config
          env:
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef: { name: skybook-secrets, key: POSTGRES_USER }
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef: { name: skybook-secrets, key: POSTGRES_PASSWORD }
          volumeMounts:
            - name: otel
              mountPath: /otel
              readOnly: true
          startupProbe:
            httpGet: { path: /actuator/health/liveness, port: 8082 }
            periodSeconds: 5
            failureThreshold: 30 # up to 150s of cold start (JVM + agent)
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8082 }
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8082 }
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests: { memory: "384Mi", cpu: "150m" }
            limits: { memory: "768Mi" } # no CPU limit - JVM throttling hurts more than it protects (§8)
      volumes:
        - name: otel
          emptyDir: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: flight-service-config
  namespace: skybook
data:
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/skybook_flight
  SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: "-1"
  JAVA_OPTS: -javaagent:/otel/opentelemetry-javaagent-2.14.0.jar
  OTEL_SERVICE_NAME: flight-service
  OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
  OTEL_EXPORTER_OTLP_PROTOCOL: grpc
  OTEL_TRACES_EXPORTER: otlp
  OTEL_METRICS_EXPORTER: none
  OTEL_LOGS_EXPORTER: none
