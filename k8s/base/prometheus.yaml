apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: skybook
---
# Pod discovery needs list/watch on pods (KUBERNETES_MODULE.md §10).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: skybook-prometheus
rules:
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: skybook-prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: skybook-prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: skybook
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: skybook
spec:
  type: ClusterIP # reached via kubectl port-forward only (§9)
  selector:
    app: prometheus
  ports:
    - port: 9090
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: skybook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v3.2.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
              readOnly: true
            - name: data
              mountPath: /prometheus
          readinessProbe:
            httpGet: { path: /-/ready, port: 9090 }
            periodSeconds: 10
          resources:
            requests: { memory: "256Mi", cpu: "100m" }
            limits: { memory: "512Mi" }
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: skybook
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
