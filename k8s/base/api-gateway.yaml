# The ONLY publicly-reachable service (via the Ingress in ingress.yaml).
# Its own Service stays ClusterIP - exposure happens exclusively through
# ingress-nginx (KUBERNETES_MODULE.md §9).
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: skybook
spec:
  type: ClusterIP
  selector:
    app: api-gateway
  ports:
    - port: 8080
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: skybook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /actuator/prometheus
        prometheus.io/port: "8080"
    spec:
      initContainers:
        - name: otel-agent
          image: ghcr.io/praveencloudlab/skybook-otel-agent:2.14.0
          volumeMounts:
            - name: otel
              mountPath: /target
      containers:
        - name: api-gateway
          image: ghcr.io/praveencloudlab/skybook-api-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: api-gateway-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef: { name: skybook-secrets, key: JWT_SECRET }
          volumeMounts:
            - name: otel
              mountPath: /otel
              readOnly: true
          startupProbe:
            httpGet: { path: /actuator/health/liveness, port: 8080 }
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8080 }
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8080 }
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests: { memory: "384Mi", cpu: "150m" }
            limits: { memory: "768Mi" }
      volumes:
        - name: otel
          emptyDir: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: skybook
data:
  SERVICES_AUTH_SERVICE_BASE_URL: http://auth-service:8081
  SERVICES_FLIGHT_SERVICE_BASE_URL: http://flight-service:8082
  SERVICES_BOOKING_SERVICE_BASE_URL: http://booking-service:8083
  SERVICES_INVENTORY_SERVICE_BASE_URL: http://inventory-service:8084
  SERVICES_PAYMENT_SERVICE_BASE_URL: http://payment-service:8086
  SERVICES_CHECKIN_SERVICE_BASE_URL: http://checkin-service:8087
  JAVA_OPTS: -javaagent:/otel/opentelemetry-javaagent-2.14.0.jar
  OTEL_SERVICE_NAME: api-gateway
  OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
  OTEL_EXPORTER_OTLP_PROTOCOL: grpc
  OTEL_TRACES_EXPORTER: otlp
  OTEL_METRICS_EXPORTER: none
  OTEL_LOGS_EXPORTER: none
---
# Hostless rule (design review): no host field, so http://localhost works
# on Docker Desktop with zero hosts-file edits. The single public entry
# point to the entire platform.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: skybook
  namespace: skybook
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080
