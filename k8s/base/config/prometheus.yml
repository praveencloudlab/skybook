# k8s-specific Prometheus config (KUBERNETES_MODULE.md §10): pod-annotation
# discovery replaces the compose file's static target list - survives pod
# restarts and picks up future services automatically. Pods opt in with
# prometheus.io/scrape: "true" + path/port annotations.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: skybook-pods
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: [skybook]
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        regex: "true"
        action: keep
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - source_labels: [__meta_kubernetes_pod_label_app]
        target_label: service
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
