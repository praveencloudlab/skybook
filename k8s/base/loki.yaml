apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: skybook
spec:
  type: ClusterIP
  selector:
    app: loki
  ports:
    - port: 3100
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: skybook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      containers:
        - name: loki
          image: grafana/loki:3.4.2
          args: ["-config.file=/etc/loki/loki.yml"]
          ports:
            - containerPort: 3100
          volumeMounts:
            - name: config
              mountPath: /etc/loki
              readOnly: true
            - name: data
              mountPath: /loki
          readinessProbe:
            httpGet: { path: /ready, port: 3100 }
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests: { memory: "256Mi", cpu: "100m" }
            limits: { memory: "512Mi" }
      volumes:
        - name: config
          configMap:
            name: loki-config
        - name: data
          persistentVolumeClaim:
            claimName: loki-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: loki-data
  namespace: skybook
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
