# No DB, no exposed API routes (Kafka-consumer-only) - readiness carries only
# readinessState (KUBERNETES_MODULE.md §7).
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: skybook
spec:
  type: ClusterIP
  selector:
    app: notification-service
  ports:
    - port: 8085
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: skybook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /actuator/prometheus
        prometheus.io/port: "8085"
    spec:
      initContainers:
        - name: otel-agent
          image: ghcr.io/praveencloudlab/skybook-otel-agent:2.14.0
          volumeMounts:
            - name: otel
              mountPath: /target
      containers:
        - name: notification-service
          image: ghcr.io/praveencloudlab/skybook-notification-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8085
          envFrom:
            - configMapRef:
                name: notification-service-config
          env:
            - name: MAIL_USERNAME
              valueFrom:
                secretKeyRef: { name: skybook-secrets, key: MAIL_USERNAME }
            - name: MAIL_PASSWORD
              valueFrom:
                secretKeyRef: { name: skybook-secrets, key: MAIL_PASSWORD }
          volumeMounts:
            - name: otel
              mountPath: /otel
              readOnly: true
          startupProbe:
            httpGet: { path: /actuator/health/liveness, port: 8085 }
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8085 }
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8085 }
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests: { memory: "384Mi", cpu: "150m" }
            limits: { memory: "768Mi" }
      volumes:
        - name: otel
          emptyDir: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-service-config
  namespace: skybook
data:
  SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  JAVA_OPTS: -javaagent:/otel/opentelemetry-javaagent-2.14.0.jar
  OTEL_SERVICE_NAME: notification-service
  OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
  OTEL_EXPORTER_OTLP_PROTOCOL: grpc
  OTEL_TRACES_EXPORTER: otlp
  OTEL_METRICS_EXPORTER: none
  OTEL_LOGS_EXPORTER: none
